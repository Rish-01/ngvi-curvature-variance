# experiments/configs/neals_funnel.yaml
# ─────────────────────────────────────────────────────────────────────
# Neal's Funnel experiment configuration
# D = 10: 1 funnel variable v + 9 normal variables x_i
# ─────────────────────────────────────────────────────────────────────

model:
  name: neals_funnel
  D: 10
  v_scale: 3.0

variational:
  family: mean_field          # mean_field | low_rank_diag
  low_rank_dim: 3             # only used when family: low_rank_diag

# ── Compute budget ────────────────────────────────────────────────────
# Convergence runs often need more iters than ablations; override with
#   python experiments/run_convergence.py --n_iters 20000
budget:
  n_iters: 12000
  log_every: 100

# ── Methods to run and their base hyperparameters ────────────────────
methods:

  bbvi_adam:
    lr: 1e-4
    n_samples: 50
    betas: [0.9, 0.999]
    eps_adam: 1e-8

  natural_gradient:
    lr: 1e-2
    n_samples: 10
    damping: 1e-4

  diagonal_fisher:
    lr: 1e-2
    n_samples: 10
    damping: 1e-3
    fisher_ema: 0.9

  variance_reduced:
    # Antithetic MC only: STL changes the training surrogate vs. the ELBO we
    # evaluate, which often destabilizes Adam on Neal's funnel.
    lr: 3.0e-4
    n_samples: 20
    use_antithetic: true
    use_stl: false

# ── Diagnostics ───────────────────────────────────────────────────────
diagnostics:
  track_grad_var: true        # ||Var(g)||_2 over trajectory
  track_fisher_cond: true     # condition number of F(phi) over trajectory
  track_elbo: true
  track_wall_time: true

# ── Ablation 1: stochasticity (vary MC samples, isolate noise) ────────
ablation_mc_samples:
  enabled: true
  method: bbvi_adam           # run this method across all sample counts
  sample_counts: [1, 5, 10, 50, 100]
  n_iters: 3000               # shorter run per probe

# ── Ablation 2: damping (vary lambda, isolate preconditioning) ────────
ablation_damping:
  enabled: true
  method: diagonal_fisher
  damping_values: [1.0e-6, 1.0e-4, 1.0e-2, 1.0e-1, 1.0, 10.0, 100.0]
  n_iters: 3000

# ── Max stable learning rate sweep ───────────────────────────────────
lr_sweep:
  enabled: true
  lr_grid: [1.0, 0.316, 0.1, 0.0316, 0.01, 0.00316, 0.001, 0.000316]
  n_probe_iters: 300

# ── Reproducibility ───────────────────────────────────────────────────
seed: 42